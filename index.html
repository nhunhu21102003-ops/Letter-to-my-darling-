<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gửi Quốc Anh</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Quicksand:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-pink: #fce4ec;
            --dark-pink: #e91e63;
            --text-gray: #5d4037;
        }

        body {
            margin: 0; padding: 0;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #fce4ec 0%, #f8bbd0 100%);
            font-family: 'Quicksand', sans-serif;
            overflow-x: hidden;
        }

        #falling-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
        }

        .heart, .falling-text {
            position: absolute; animation: fall linear infinite;
        }

        .heart { color: white; }
        .falling-text {
            color: #ff80ab; font-family: 'Dancing Script', cursive;
            white-space: nowrap; font-weight: bold;
            transform: rotate(0deg); 
        }

        @keyframes fall {
            0% { transform: translateY(-100px); opacity: 0; }
            10% { opacity: 0.8; }
            100% { transform: translateY(100vh); opacity: 0; }
        }

        .envelope-wrapper { position: relative; z-index: 10; cursor: pointer; margin-bottom: 30px; }

        .envelope {
            width: 300px; height: 200px; background: #ffffff;
            border-radius: 0 0 10px 10px; position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .envelope::before {
            content: ""; position: absolute; top: -100px; left: 0;
            border-left: 150px solid transparent; border-right: 150px solid transparent;
            border-bottom: 100px solid #ffffff; z-index: 2;
        }

        .stamp {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 60px; height: 60px; background: var(--dark-pink);
            border-radius: 50%; z-index: 4;
            display: flex; justify-content: center; align-items: center;
            color: white; font-size: 24px;
        }

        .letter {
            position: fixed; top: 45%; left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 85%; max-width: 420px; max-height: 75vh;
            background: white; padding: 25px; border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            z-index: 100; overflow-y: auto;
            transition: 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0; text-align: center;
        }

        .envelope-wrapper.open .letter { transform: translate(-50%, -50%) scale(1); opacity: 1; }

        .letter-content {
            font-family: 'Dancing Script', cursive; font-size: 1.3rem;
            color: var(--text-gray); line-height: 1.6;
        }

        .music-container { margin-top: 20px; border-radius: 12px; overflow: hidden; background: #000; height: 80px; }

        .close-btn {
            margin-top: 15px; padding: 8px 20px;
            background: var(--dark-pink); border: none;
            border-radius: 20px; color: white; cursor: pointer;
        }

        .counter-container {
            position: relative; z-index: 5;
            background: rgba(255, 255, 255, 0.4);
            padding: 15px 25px; border-radius: 25px;
            text-align: center; color: var(--text-gray);
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-top: 10px;
        }

        .timer { font-size: 1.1rem; font-weight: bold; color: var(--dark-pink); }
    </style>
</head>
<body>

    <div id="falling-container"></div>

    <div class="envelope-wrapper" id="wrapper" onclick="handleEnvelopeClick()">
        <div class="envelope">
            <div class="stamp">❤</div>
        </div>
        
        <div class="letter">
            <div class="letter-content">
                hello anhuiiu dấu cụa iem,<br><br>
                hí hí hỏng có gì trong này hết á lêu lêu lêu, em chỉ test code em mới tạo hui cưng ơi, cảm ơn cưng đã enjoy cái mâu mần này nhế há há<br>
                — Như Quỳnh nè love uuu he
                
                <div class="music-container">
                    <iframe id="youtube-player" width="100%" height="80" src="https://www.youtube.com/embed/oQKZC6Qnrqw?start=50&enablejsapi=1" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
                </div>
                
                <button class="close-btn" onclick="closeLetter(event)">Đóng thư</button>
            </div>
        </div>
    </div>

    <div class="counter-container">
        <div class="counter-title">Chúng mình đã bên nhau được:</div>
        <div class="timer" id="timer">Đang tính...</div>
    </div>

    <script>
        function handleEnvelopeClick() {
            const wrapper = document.getElementById('wrapper');
            if (!wrapper.classList.contains('open')) {
                const password = prompt("Nhập mật mã tình yêu của chúng mình (ddmmyyyy):");
                if (password === "16052024") {
                    openLetter();
                } else if (password !== null) {
                    alert("Sai mật mã rồi cưng ơi! Thử lại xem nè 😘");
                }
            }
        }

        function openLetter() {
            document.getElementById('wrapper').classList.add('open');
            // Kích hoạt nhạc tự phát khi mở thư
            const player = document.getElementById('youtube-player');
            player.src += "&autoplay=1";
        }

        function closeLetter(event) {
            event.stopPropagation();
            document.getElementById('wrapper').classList.remove('open');
            // Dừng nhạc khi đóng thư
            const player = document.getElementById('youtube-player');
            player.src = player.src.replace("&autoplay=1", "");
        }

        // Bộ đếm thời gian
        const startDate = new Date("2024-05-16T00:00:00").getTime();
        function updateTimer() {
            const now = new Date().getTime();
            const diff = now - startDate;
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);
            document.getElementById("timer").innerHTML = days + " ngày " + hours + " giờ " + minutes + " phút " + seconds + " giây";
        }
        setInterval(updateTimer, 1000);

        // Hiệu ứng chữ rơi
        const container = document.getElementById('falling-container');
        const textArray = ["i love u", "miss you", "QuocAnh", "onlyyou", "NhuHuynh", "foreverlove"];
        function createFallingItem() {
            const isHeart = Math.random() < 0.6;
            const el = document.createElement('div');
            if (isHeart) {
                el.classList.add('heart');
                el.innerHTML = '❤';
                el.style.fontSize = (Math.random() * 15 + 15) + 'px';
            } else {
                el.classList.add('falling-text');
                el.innerHTML = textArray[Math.floor(Math.random() * textArray.length)];
                el.style.fontSize = (Math.random() * 8 + 18) + 'px';
            }
            el.style.left = Math.random() * 95 + 'vw';
            el.style.animationDuration = (Math.random() * 3 + 5) + 's';
            container.appendChild(el);
            setTimeout(() => el.remove(), 8000);
        }
        setInterval(createFallingItem, 400);
    </script>
</body>
</html>
