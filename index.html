<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gửi Quốc Anh</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Quicksand:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-pink: #fce4ec;
            --dark-pink: #e91e63;
            --text-gray: #5d4037;
        }

        body {
            margin: 0; padding: 0;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #fce4ec 0%, #f8bbd0 100%);
            font-family: 'Quicksand', sans-serif;
            overflow-x: hidden;
        }

        #falling-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
        }

        .heart, .falling-text {
            position: absolute; animation: fall linear infinite;
        }

        /* Lớp màu trái tim ngẫu nhiên */
        .heart.red { color: #ff3366; opacity: 0.9; } /* Màu đỏ tươi mờ nhẹ */
        .heart.white { color: #ffffff; opacity: 0.9; } /* Màu trắng mờ nhẹ */

        .falling-text {
            color: #ff80ab; font-family: 'Dancing Script', cursive;
            white-space: nowrap; font-weight: bold;
            transform: rotate(0deg); 
        }

        @keyframes fall {
            0% { transform: translateY(-100px); opacity: 0; }
            10% { opacity: 1; }
            100% { transform: translateY(100vh); opacity: 0; }
        }

        .envelope-wrapper { position: relative; z-index: 10; cursor: pointer; margin-bottom: 30px; }

        .envelope {
            width: 300px; height: 200px; background: #ffffff;
            border-radius: 0 0 10px 10px; position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .envelope::before {
            content: ""; position: absolute; top: -100px; left: 0;
            border-left: 150px solid transparent; border-right: 150px solid transparent;
            border-bottom: 100px solid #ffffff; z-index: 2;
        }

        .stamp {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 60px; height: 60px; background: var(--dark-pink);
            border-radius: 50%; z-index: 4;
            display: flex; justify-content: center; align-items: center;
            color: white; font-size: 24px;
        }

        .letter {
            position: fixed; top: 45%; left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 85%; max-width: 420px; max-height: 75vh;
            background: white; padding: 25px; border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            z-index: 100; overflow-y: auto;
            transition: 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0; text-align: center;
        }

        .envelope-wrapper.open .letter { transform: translate(-50%, -50%) scale(1); opacity: 1; }

        .letter-content {
            font-family: 'Dancing Script', cursive; font-size: 1.3rem;
            color: var(--text-gray); line-height: 1.6;
        }

        .spotify-container { 
            margin-top: 20px; 
            border-radius: 12px; 
            overflow: hidden; 
            min-height: 152px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .close-btn {
            margin-top: 15px; padding: 8px 20px;
            background: var(--dark-pink); border: none;
            border-radius: 20px; color: white; cursor: pointer;
        }

        .counter-container {
            position: relative; z-index: 5;
            background: rgba(255, 255, 255, 0.4);
            padding: 15px 25px; border-radius: 25px;
            text-align: center; color: var(--text-gray);
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-top: 10px;
        }

        .timer { font-size: 1.1rem; font-weight: bold; color: var(--dark-pink); }
    </style>
</head>
<body>

    <div id="falling-container"></div>

    <div class="envelope-wrapper" id="wrapper" onclick="handleEnvelopeClick()">
        <div class="envelope">
            <div class="stamp">❤</div>
        </div>
        
        <div class="letter">
            <div class="letter-content">
                hello anhuiiu dấu cụa iem,<br><br>
                hí hí hỏng có gì trong này hết á lêu lêu lêu, em chỉ test code em mới tạo hui cưng ơi, cảm ơn cưng đã enjoy cái mâu mần này nhế há há<br>
                — Như Quỳnh nè love uuu he
                
                <div class="spotify-container">
                    <iframe style="border-radius:12px" 
                        src="https://open.spotify.com/embed/...3" 
                        width="100%" height="152" frameBorder="0" allowfullscreen="" 
                        allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" 
                        loading="lazy">
                    </iframe>
                </div>
                
                <button class="close-btn" onclick="closeLetter(event)">Đóng thư</button>
            </div>
        </div>
    </div>

    <div class="counter-container">
        <div class="counter-title">Chúng mình đã bên nhau được:</div>
        <div class="timer" id="timer">Đang tính...</div>
    </div>

    <script>
        function handleEnvelopeClick() {
            const wrapper = document.getElementById('wrapper');
            if (!wrapper.classList.contains('open')) {
                const password = prompt("Nhập mật mã tình yêu của chúng mình (ddmmyyyy):");
                if (password === "16052024") {
                    openLetter();
                } else if (password !== null) {
                    alert("Sai mật mã rồi cưng ơi! Thử lại xem nè 😘");
                }
            }
        }

        function openLetter() {
            document.getElementById('wrapper').classList.add('open');
        }

        function closeLetter(event) {
            event.stopPropagation();
            document.getElementById('wrapper').classList.remove('open');
        }

        const startDate = new Date("2024-05-16T00:00:00").getTime();
        function updateTimer() {
            const now = new Date().getTime();
            const diff = now - startDate;
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);
            document.getElementById("timer").innerHTML = days + " ngày " + hours + " giờ " + minutes + " phút " + seconds + " giây";
        }
        setInterval(updateTimer, 1000);

        const container = document.getElementById('falling-container');
        const textArray = ["i love u", "miss you", "QuocAnh", "onlyyou", "NhuHuynh", "foreverlove", " há há há", nhớ ôn chã nhìu", "iu ôn chã"];
        function createFallingItem() {
            // Ngẫu nhiên chọn rơi trái tim (80%) hoặc chữ (20%)
            if (Math.random() < 0.8) {
                createHeart();
            } else {
                createFallingText();
            }
        }

        // Hàm tạo trái tim rơi với màu trắng/đỏ ngẫu nhiên
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            
            // Ngẫu nhiên gán lớp 'red' hoặc 'white'
            if (Math.random() < 0.5) {
                heart.classList.add('red');
            } else {
                heart.classList.add('white');
            }
            
            heart.innerHTML = '❤';
            heart.style.left = Math.random() * 95 + 'vw';
            heart.style.fontSize = (Math.random() * 15 + 15) + 'px'; // 15px - 30px
            heart.style.animationDuration = (Math.random() * 3 + 4) + 's'; // Rơi nhanh hơn chút
            
            container.appendChild(heart);
            setTimeout(() => { heart.remove(); }, 6000);
        }

        // Hàm tạo chữ rơi (đã chỉnh nằm ngang)
        function createFallingText() {
            const textEl = document.createElement('div');
            textEl.classList.add('falling-text');
            textEl.innerHTML = textArray[Math.floor(Math.random() * textArray.length)];
            textEl.style.left = Math.random() * 90 + 'vw'; 
            textEl.style.fontSize = (Math.random() * 8 + 18) + 'px'; // 18px - 26px
            textEl.style.animationDuration = (Math.random() * 4 + 4) + 's'; // 4s - 8s (rơi chậm hơn)
            
            container.appendChild(textEl);
            setTimeout(() => { textEl.remove(); }, 8000);
        }

        // Tạo phần tử rơi mỗi 300ms (dày đặc hơn chút)
        setInterval(createFallingItem, 300);
    </script>
</body>
</html>
